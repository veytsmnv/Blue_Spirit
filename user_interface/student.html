<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student's View</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --border: #cccccc;
      --accent: #000000;
      --text: #000000;
      --muted: #666;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--text);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--accent);
      margin: 16px auto 0;
      opacity: 0.4;
    }

    .image-frame {
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px;
    }

    .image-frame img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .image-label {
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: right;
    }
  </style>
</head>
<body>

  <header>
    <h1>Student's View</h1>
    <p>Live Camera Feed</p>
    <div class="divider"></div>
  </header>

  <div class="image-frame">
    <img id="cameraFeed" src="/images/latest.jpg" alt="Camera Feed">
    <div class="image-label">Latest Capture</div>
  </div>

  <script src="js/student.js"></script>

</body>
<div class="nav-buttons">
  <button class="nav-btn" id="backBtn" disabled>← Back</button>
  <span id="imageCount"></span>
  <button class="nav-btn" id="forwardBtn" disabled>Forward →</button>
</div>
</html>
