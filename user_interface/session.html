<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Professor's View</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1>Professor's <span>View</span></h1>
    <p>Live Camera Feed</p>
    <div class="divider"></div>
  </header>

  <button class="capture-btn" id="captureBtn">Take Photo</button>
  <p id="status"></p>

  <div class="image-frame">
    <img id="cameraFeed" src="/images/latest.jpg" alt="Camera Feed">
    <div class="image-label">Latest Capture</div>
  </div>

  <script src="js/professor.js" defer></script>

</body>
<div class="nav-buttons">
  <button class="nav-btn" id="backBtn" disabled>← Back</button>
  <span id="imageCount"></span>
  <button class="nav-btn" id="forwardBtn" disabled>Forward →</button>
</div>
</html>
