<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Gallery</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Student Gallery</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="session.html">Professor Session</a>
        <a href="gallery.html" class="active">Student Gallery</a>
      </nav>
    </div>
  </header>

  <main class="container page-layout">
    <section class="panel">
      <div class="gallery-topbar">
        <div>
          <h2>Live Lecture Captures</h2>
          <p id="gallerySessionInfo" class="muted">Waiting for an active lecture session.</p>
        </div>
        <button id="refreshGalleryBtn" class="btn btn-secondary">Refresh</button>
      </div>
    </section>

    <section class="panel">
      <div id="galleryGrid" class="gallery-grid">
        <p class="muted">No images available yet.</p>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/realtime.js"></script>
</body>
</html>
